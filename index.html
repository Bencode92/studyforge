<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyForge</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{--bg:#060610;--sf:#0d0d1a;--card:#111122;--brd:#1a1a33;--acc:#7B68EE;--accG:#7B68EE33;--grn:#34d399;--grnD:#34d39922;--red:#f87171;--redD:#f8717122;--org:#fbbf24;--orgD:#fbbf2422;--blu:#60a5fa;--txt:#e8e8f0;--txD:#6b6b88;--txM:#9999b0}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Outfit',system-ui,sans-serif;min-height:100vh;display:flex}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
input,textarea,select{font-family:inherit;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--acc)!important}
option{background:var(--card);color:var(--txt)}
@keyframes spin{to{transform:rotate(360deg)}}
.btn{padding:8px 18px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-size:13px;font-family:inherit;transition:all .15s}
.btn:disabled{opacity:.4;cursor:default}
.btn-pri{background:var(--acc);color:#fff}.btn-sec{background:var(--brd);color:var(--txD)}.btn-grn{background:var(--grn);color:#000}
.card{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:20px;margin-bottom:14px}
.card-glow{border-color:color-mix(in srgb,var(--acc) 30%,transparent)}
.card-dash{border-style:dashed}
.spinner{width:12px;height:12px;border:2px solid var(--acc);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
#sidebar{width:250px;min-height:100vh;background:var(--sf);border-right:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
#sidebar.closed{width:0}
#main{flex:1;display:flex;flex-direction:column;min-height:100vh}
#topbar{padding:10px 24px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px}
#content{flex:1;overflow-y:auto;padding:24px}
.cat-item{padding:9px 12px;border-radius:10px;cursor:pointer;font-size:12.5px;margin-bottom:2px;display:flex;align-items:center;gap:9px;color:var(--txM)}
.cat-item:hover,.cat-item.active{background:var(--accG);color:var(--acc);font-weight:600}
.concept{padding:10px 14px;margin:5px 0;border-radius:10px;background:var(--sf);border-left:3px solid var(--acc)}
.tag{font-size:10px;padding:3px 8px;border-radius:5px;display:inline-block}
.tag-grn{color:var(--grn);background:var(--grnD)}.tag-acc{color:var(--acc);background:var(--accG)}.tag-org{color:var(--org);background:var(--orgD)}
.fiche-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.fiche-card{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:18px;cursor:pointer;transition:border .15s}
.fiche-card:hover{border-color:var(--acc)}
.hidden{display:none!important}
#token-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:999}
.drop-zone{border:2px dashed var(--brd);border-radius:14px;padding:40px;text-align:center;cursor:pointer;transition:all .2s}
.drop-zone:hover,.drop-zone.drag{border-color:var(--acc);background:var(--accG)}
</style>
</head>
<body>

<div id="token-modal" class="hidden">
  <div class="card" style="max-width:420px;width:90%;text-align:center;padding:32px">
    <h3 style="font-size:18px;font-weight:700;margin-bottom:8px">Token GitHub requis</h3>
    <p style="color:var(--txD);font-size:12px;margin-bottom:20px">Necessaire pour sauvegarder. Session uniquement.</p>
    <input id="modal-token" type="password" placeholder="GitHub Personal Access Token" style="width:100%;padding:12px 16px;border-radius:10px;background:var(--sf);border:1px solid var(--brd);color:var(--txt);font-size:13px;margin-bottom:12px" onkeydown="if(event.key==='Enter')confirmToken()">
    <div style="display:flex;gap:8px"><button onclick="cancelToken()" class="btn btn-sec" style="flex:1">Annuler</button><button onclick="confirmToken()" class="btn btn-pri" style="flex:1">Valider</button></div>
  </div>
</div>

<div id="app" style="display:flex;width:100%">
  <div id="sidebar">
    <div style="padding:20px 16px 12px;display:flex;align-items:center;gap:10px">
      <div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--acc),var(--blu));display:flex;align-items:center;justify-content:center;font-size:13px">&#128218;</div>
      <span style="font-weight:800;font-size:15px">StudyForge</span>
    </div>
    <div style="padding:0 10px;flex:1;overflow-y:auto">
      <p style="font-size:9px;font-weight:700;color:var(--txD);text-transform:uppercase;letter-spacing:1.5px;padding:12px 6px 6px">Categories</p>
      <div id="cat-list"></div>
    </div>
    <div style="padding:10px;border-top:1px solid var(--brd)">
      <button onclick="requireToken(()=>showView('newcat'))" class="btn btn-pri" style="width:100%;margin-bottom:6px">+ Categorie</button>
      <button onclick="requireToken(()=>showView('import'))" class="btn btn-sec" style="width:100%;border:1px solid var(--brd)">+ Fiche</button>
    </div>
  </div>
  <div id="main">
    <div id="topbar">
      <button onclick="document.getElementById('sidebar').classList.toggle('closed')" style="background:none;border:none;color:var(--txD);cursor:pointer;font-size:16px;padding:4px">&#9776;</button>
      <div id="fiche-tabs" class="hidden" style="display:flex;gap:5px"></div>
      <div style="flex:1"></div>
      <div id="status-bar" class="hidden" style="display:flex;align-items:center;gap:8px"><div class="spinner"></div><span id="status-text" style="font-size:11px;color:var(--acc)"></span></div>
      <span id="gh-tag" class="tag tag-acc">&#128214; Lecture</span>
    </div>
    <div id="content"></div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const GH={token:'',owner:'Bencode92',repo:'studyforge'};
let cats=[],selCat=null,ficheList=[],fiche=null,ficheSha=null,currentView='home';
let pendingAction=null,pdfText='';

function $(id){return document.getElementById(id)}
function setStatus(t,s=true){$('status-bar').classList.toggle('hidden',!s);$('status-text').textContent=t}
function showView(v){currentView=v;render()}
function hasToken(){return !!GH.token}

function requireToken(action){
  if(hasToken()){action();return}
  const s=sessionStorage.getItem('sf_gh_token');
  if(s){GH.token=s;updateTag();action();return}
  pendingAction=action;$('token-modal').classList.remove('hidden');$('modal-token').focus();
}
function confirmToken(){const t=$('modal-token').value.trim();if(!t)return;GH.token=t;sessionStorage.setItem('sf_gh_token',t);$('token-modal').classList.add('hidden');$('modal-token').value='';updateTag();if(pendingAction){const a=pendingAction;pendingAction=null;a()}}
function cancelToken(){$('token-modal').classList.add('hidden');pendingAction=null}
function updateTag(){$('gh-tag').className='tag '+(hasToken()?'tag-grn':'tag-acc');$('gh-tag').textContent=hasToken()?'\u2713 GitHub':'\ud83d\udcd6 Lecture'}

// GitHub READ (public, no auth)
async function ghRead(p){const r=await fetch('https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/contents/'+p,{headers:{'Accept':'application/vnd.github.v3+json'}});if(!r.ok)throw new Error(r.statusText);return r.json()}
async function ghGet(p){try{const d=await ghRead(p);return{content:JSON.parse(atob(d.content)),sha:d.sha}}catch{return null}}
async function ghLs(p){try{const d=await ghRead(p);return Array.isArray(d)?d:[]}catch{return[]}}

// GitHub WRITE (needs token)
async function ghPut(p,c,msg,sha){
  if(!GH.token)throw new Error('Token requis');
  const b={message:msg,content:btoa(unescape(encodeURIComponent(typeof c==='string'?c:JSON.stringify(c,null,2))))};
  if(sha)b.sha=sha;
  const r=await fetch('https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/contents/'+p,{method:'PUT',headers:{'Authorization':'token '+GH.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(b)});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||r.statusText)}
  return r.json();
}

// PDF extraction
async function extractPdf(file){
  setStatus('Extraction PDF...');
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf,useSystemFonts:true}).promise;
    let text='';
    for(let i=1;i<=pdf.numPages;i++){
      const pg=await pdf.getPage(i);
      const ct=await pg.getTextContent();
      text+=ct.items.map(x=>x.str).join(' ')+'\n\n';
      setStatus('Page '+i+'/'+pdf.numPages);
    }
    pdfText=text;
    const ti=$('imp-title');if(ti)ti.value=file.name.replace(/\.pdf$/i,'');
    const tx=$('imp-text');if(tx)tx.value=text;
    setStatus('PDF extrait !',true);setTimeout(()=>setStatus('',false),2000);
  }catch(e){setStatus('Erreur PDF: '+e.message)}
}

// Init
async function init(){
  const s=sessionStorage.getItem('sf_gh_token');if(s){GH.token=s;updateTag()}
  setStatus('Chargement...');
  try{const idx=await ghGet('data/index.json');if(idx)cats=idx.content.categories||[]}catch(e){console.log('Init error:',e)}
  renderCats();setStatus('',false);render();
}

function renderCats(){
  $('cat-list').innerHTML=cats.map(c=>'<div class="cat-item '+(selCat?.id===c.id?'active':'')+'" onclick="loadCat(\''+c.id+'\')"><span style="font-size:15px">'+c.icon+'</span>'+c.name+'</div>').join('');
}

async function loadCat(id){
  selCat=cats.find(c=>c.id===id);fiche=null;renderCats();setStatus('Chargement...');currentView='home';
  try{
    const meta=await ghGet('data/'+id+'/_meta.json');
    if(meta?.content?.fiches?.length)ficheList=meta.content.fiches;
    else{const fs=await ghLs('data/'+id);ficheList=fs.filter(f=>f.name.endsWith('.json')&&f.name!=='_meta.json').map(f=>({id:f.name.replace('.json',''),title:f.name.replace('.json','').replace(/-/g,' ')}))}
  }catch{ficheList=[]}
  setStatus('',false);render();
}

async function loadFiche(id){
  if(!selCat)return;setStatus('Chargement...');
  try{const f=await ghGet('data/'+selCat.id+'/'+id+'.json');if(f){fiche=f.content;ficheSha=f.sha;currentView='fiche'}}catch(e){setStatus('Erreur: '+e.message)}
  setStatus('',false);render();
}

async function importFiche(){
  if(!hasToken()){requireToken(importFiche);return}
  const text=$('imp-text')?.value, title=$('imp-title')?.value, cat=$('imp-cat')?.value;
  if(!text||!title||!cat){setStatus('Remplis tous les champs');return}
  setStatus('Sauvegarde...');
  const today=new Date().toISOString().split('T')[0];
  const slug=title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+$/,'');
  const ficheData={
    metadata:{title:title,category:cat,created:today,version:1,verified:false,verificationNotes:[],sources:[{type:'import',name:title,date:today}]},
    base:{sections:[{title:title,content:text,concepts:[],keyPoints:[],warnings:[],examples:[]}]},
    enrichments:[],
    quiz:{totalAttempts:0,history:[],weakPoints:[]}
  };
  try{
    await ghPut('data/'+cat+'/'+slug+'.json',ficheData,'Add: '+title);
    const meta=await ghGet('data/'+cat+'/_meta.json');
    if(meta){const nm={...meta.content};if(!nm.fiches)nm.fiches=[];nm.fiches.push({id:slug,title:title});await ghPut('data/'+cat+'/_meta.json',nm,'Update meta',meta.sha)}
    setStatus('Fiche creee !');await loadCat(cat);
  }catch(e){setStatus('Erreur: '+e.message)}
}

async function createCat(){
  if(!hasToken()){requireToken(createCat);return}
  const name=$('newcat-name')?.value?.trim();if(!name)return;
  const id=name.toLowerCase().replace(/[^a-z0-9]+/g,'-');setStatus('Creation...');
  try{
    await ghPut('data/'+id+'/_meta.json',{name:name,icon:'\ud83d\udcc2',fiches:[]},'New: '+name);
    const idx=await ghGet('data/index.json');
    const nc=[...(idx?.content.categories||cats),{id:id,name:name,icon:'\ud83d\udcc2'}];
    await ghPut('data/index.json',{categories:nc,version:(idx?.content.version||0)+1},'Add cat',idx?.sha);
    cats=nc;renderCats();setStatus('OK !');currentView='home';render();
  }catch(e){setStatus('Erreur: '+e.message)}
}

// ======= RENDER =======
function render(){
  const C=$('content');const tabs=$('fiche-tabs');
  if(fiche){tabs.classList.remove('hidden');tabs.style.display='flex';tabs.innerHTML='<button class="btn '+(currentView==='fiche'?'btn-pri':'btn-sec')+'" onclick="currentView=\'fiche\';render()">Fiche</button>'}
  else{tabs.classList.add('hidden')}

  // HOME
  if(currentView==='home'&&!selCat){
    C.innerHTML='<div style="text-align:center;padding-top:80px"><div style="font-size:56px;margin-bottom:12px">&#128218;</div><h2 style="font-size:22px;font-weight:800">StudyForge</h2><p style="color:var(--txD);font-size:13px;margin-top:8px">Selectionne une categorie ou importe une fiche</p><p style="color:var(--txD);font-size:11px;margin-top:16px">&#x1F916; Pour la verification IA, les quiz et la discussion :<br>utilise Claude Desktop avec ce repo</p></div>';
    return;
  }
  if(currentView==='home'&&selCat){
    C.innerHTML='<h2 style="font-size:20px;font-weight:800;margin-bottom:4px">'+selCat.icon+' '+selCat.name+'</h2><p style="color:var(--txD);font-size:12px;margin-bottom:20px">'+ficheList.length+' fiche'+(ficheList.length!==1?'s':'')+'</p>'+
    (ficheList.length===0?'<div class="card" style="text-align:center;padding:50px"><p style="color:var(--txD)">Aucune fiche dans cette categorie</p></div>':
    '<div class="fiche-grid">'+ficheList.map(f=>'<div class="fiche-card" onclick="loadFiche(\''+f.id+'\')"><h3 style="font-size:14px;font-weight:600;text-transform:capitalize;margin-bottom:4px">'+f.title+'</h3><p style="font-size:10px;color:var(--txD)">'+f.id+'</p></div>').join('')+'</div>');
    return;
  }

  // IMPORT
  if(currentView==='import'){
    C.innerHTML='<div style="max-width:700px"><h2 style="font-size:20px;font-weight:800;margin-bottom:20px">Nouvelle fiche</h2>'+
    '<div class="card"><h3 style="font-size:15px;margin-bottom:12px">1. Contenu</h3>'+
    '<div class="drop-zone" id="drop-zone" onclick="$(\'pdf-file\').click()"><input type="file" id="pdf-file" accept=".pdf" onchange="extractPdf(this.files[0])" style="display:none"><p style="font-size:14px;margin-bottom:4px">&#128196; Glisse un PDF ici ou clique</p><p style="font-size:11px;color:var(--txD)">Le texte sera extrait automatiquement</p></div>'+
    '<p style="text-align:center;color:var(--txD);font-size:12px;margin:12px 0">et / ou</p>'+
    '<textarea id="imp-text" placeholder="Colle ou ecris du texte ici (notes, chapitre, article...)" style="width:100%;min-height:200px;background:var(--sf);border:1px solid var(--brd);border-radius:10px;padding:14px;color:var(--txt);font-size:13px;resize:vertical;line-height:1.6"></textarea></div>'+
    '<div class="card"><h3 style="font-size:15px;margin-bottom:12px">2. Titre et section</h3>'+
    '<input id="imp-title" placeholder="Titre de la fiche" style="width:100%;padding:12px 14px;border-radius:10px;background:var(--sf);border:1px solid var(--brd);color:var(--txt);font-size:14px;margin-bottom:12px">'+
    '<select id="imp-cat" style="width:100%;padding:10px 14px;border-radius:10px;background:var(--sf);border:1px solid var(--brd);color:var(--txt);font-size:13px;margin-bottom:16px"><option value="">Choisir une section...</option>'+cats.map(c=>'<option value="'+c.id+'">'+c.icon+' '+c.name+'</option>').join('')+'</select>'+
    '<button class="btn btn-grn" onclick="importFiche()" style="width:100%;padding:14px;font-size:14px">Sauvegarder sur GitHub</button>'+
    '<p style="color:var(--txD);font-size:11px;margin-top:10px;text-align:center">&#x1F916; Apres import, demande a Claude Desktop de verifier et structurer la fiche</p></div></div>';

    // Setup drag and drop
    setTimeout(()=>{
      const dz=$('drop-zone');if(!dz)return;
      dz.ondragover=e=>{e.preventDefault();dz.classList.add('drag')};
      dz.ondragleave=()=>dz.classList.remove('drag');
      dz.ondrop=e=>{e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])extractPdf(e.dataTransfer.files[0])};
    },50);
    return;
  }

  // NEW CAT
  if(currentView==='newcat'){
    C.innerHTML='<div style="max-width:480px"><h2 style="font-size:20px;font-weight:800;margin-bottom:20px">Nouvelle categorie</h2><div class="card"><input id="newcat-name" placeholder="Nom de la categorie..." onkeydown="if(event.key===\'Enter\')createCat()" style="width:100%;padding:14px 18px;border-radius:12px;background:var(--sf);border:1px solid var(--brd);color:var(--txt);font-size:15px;margin-bottom:16px"><button class="btn btn-pri" onclick="createCat()" style="width:100%;padding:14px">Creer</button></div></div>';
    return;
  }

  // FICHE VIEW
  if(currentView==='fiche'&&fiche){
    let h='<div style="max-width:780px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:16px"><div><h2 style="font-size:20px;font-weight:800;margin-bottom:3px">'+(fiche.metadata?.title||'')+'</h2><p style="font-size:11px;color:var(--txD)">'+(fiche.metadata?.category||'')+' | v'+(fiche.metadata?.version||1)+' | '+(fiche.metadata?.created||'')+'</p></div><div style="display:flex;gap:5px">';
    if(fiche.metadata?.verified)h+='<span class="tag tag-grn">\u2713 Verifie</span>';
    else h+='<span class="tag tag-org">Non verifie</span>';
    if(fiche.enrichments?.length)h+='<span class="tag tag-acc">+'+fiche.enrichments.length+' enrichissements</span>';
    h+='</div></div>';

    if(fiche.metadata?.verificationNotes?.length){
      h+='<div class="card"><p style="font-size:11px;font-weight:600;color:var(--grn);margin-bottom:6px">\u2713 Verification IA</p>';
      fiche.metadata.verificationNotes.forEach(function(n){h+='<p style="margin:2px 0;font-size:11px;color:var(--txM)">'+n+'</p>'});
      h+='</div>';
    }

    (fiche.base?.sections||[]).forEach(function(sec){
      h+='<div class="card"><h3 style="font-size:16px;font-weight:700;margin-bottom:10px">'+sec.title+'</h3>';
      if(sec.content)h+='<p style="font-size:12.5px;color:var(--txM);line-height:1.7;white-space:pre-wrap;margin-bottom:14px">'+sec.content+'</p>';
      (sec.concepts||[]).forEach(function(c){
        h+='<div class="concept"><div style="display:flex;justify-content:space-between"><span style="font-weight:700;font-size:12.5px">'+c.term+'</span>'+(c.ref?'<span style="font-size:9px;color:var(--txD);font-style:italic">'+c.ref+'</span>':'')+'</div><p style="margin-top:3px;font-size:11.5px;color:var(--txM);line-height:1.5">'+c.definition+'</p></div>';
      });
      (sec.keyPoints||[]).forEach(function(p){h+='<div style="padding:4px 0;font-size:12.5px;display:flex;gap:8px"><span style="color:var(--acc)">\u2192</span> '+p+'</div>'});
      (sec.warnings||[]).forEach(function(w){h+='<div style="margin-top:6px;padding:7px 12px;border-radius:8px;background:var(--orgD);font-size:11px;color:var(--org)">\u26a0 '+w+'</div>'});
      (sec.examples||[]).forEach(function(ex){h+='<div style="margin-top:4px;padding:7px 12px;border-radius:8px;background:var(--accG);font-size:11px;color:var(--txM)">Ex: '+ex+'</div>'});
      h+='</div>';
    });

    if(fiche.enrichments?.length){
      h+='<div class="card card-glow"><h4 style="font-size:13px;color:var(--acc);margin-bottom:10px">Enrichissements ('+fiche.enrichments.length+')</h4>';
      fiche.enrichments.forEach(function(e,i){
        h+='<div style="padding:7px 0;'+(i<fiche.enrichments.length-1?'border-bottom:1px solid var(--brd)':'')+'"><div style="display:flex;gap:6px;align-items:center;margin-bottom:3px"><span style="font-size:9px;color:var(--txD)">'+e.date+'</span><span class="tag '+(e.trigger==='quiz'?'tag-org':e.trigger==='discussion'?'tag-acc':'tag-grn')+'">'+e.trigger+'</span></div><p style="font-size:11.5px;color:var(--txM)">'+e.summary+'</p></div>';
      });
      h+='</div>';
    }

    h+='<div class="card" style="text-align:center;padding:30px;background:var(--sf)"><p style="font-size:13px;color:var(--txD)">&#x1F916; Pour enrichir, generer des quiz ou discuter :</p><p style="font-size:12px;color:var(--acc);margin-top:6px">Ouvre Claude Desktop et envoie le lien de cette fiche</p></div>';
    h+='</div>';
    C.innerHTML=h;return;
  }
}

init();
</script>
</body>
</html>
